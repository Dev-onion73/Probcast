    # ... etc
  
  storage_failure:
    disk_io_read:     [0.95, 0.96, 0.99, 0.91, 0.94, 1.0]
    # ... etc

  network_downtime_precursor:
    network_rx:       [0.09, 0.07, 0.06, 0.05, 0.04, 0.03]
    # ... etc

  network_downtime:
    network_rx:       [0.03, 0.00, 0.00, 0.01, 0.00, 0.00]
