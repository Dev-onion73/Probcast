  cpu_overload_precursor:
    cpu_usage:        [0.52, 0.55, 0.62, 0.67, 0.79, 0.82]
    # ... fill out rest like above

  cpu_overload:
    cpu_usage:        [0.91, 0.92, 0.97, 0.96, 0.97, 0.95]
