# Fixed regime metric curves for the mock sequencer
regimes:
  normal:
    cpu_usage:        [0.30, 0.32, 0.33, 0.31, 0.29, 0.32]
    memory_usage:     [0.42, 0.43, 0.44, 0.41, 0.40, 0.42]
